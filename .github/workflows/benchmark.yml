name: Continuous Benchmark (Go)

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: write
  deployments: write

jobs:
  benchmark:
    name: Performance regression check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run Go benchmarks
        run: |
          go version
          go test -bench . -benchmem -run ^$ ./... | tee output.txt

      - name: Download previous benchmark data (cache baseline)
        uses: actions/cache@v5
        with:
          path: ./cache
          key: ${{ runner.os }}-benchmark-${{ github.ref_name }}
          restore-keys: |
            ${{ runner.os }}-benchmark-

      - name: Ensure gh-pages branch exists
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            exit 0
          fi

          temp_dir="$(mktemp -d)"
          git init "$temp_dir"
          cd "$temp_dir"
          git checkout --orphan gh-pages
          touch .nojekyll
          git add .nojekyll
          git -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" commit -m "Initialize gh-pages"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin gh-pages

      - name: Update cache baseline with current results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: mdfm Go Benchmarks
          tool: go
          output-file-path: output.txt
          external-data-json-path: ./cache/benchmark-data.json
          fail-on-alert: false
          comment-on-alert: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Store benchmark result to GitHub Pages
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: mdfm Go Benchmarks
          tool: go
          output-file-path: output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          comment-on-alert: true
          alert-threshold: '200%'